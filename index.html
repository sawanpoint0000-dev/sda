<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp OTP Mail – Per Browser History</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>

</head>
<body>

<div id="processingOverlay">
  <div class="progress-container">
    <svg class="progress-ring" width="160" height="160">
      <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#60a5fa" />
          <stop offset="100%" stop-color="#a5b4fc" />
        </linearGradient>
      </defs>
      <circle class="progress-bg" cx="80" cy="80" r="70" />
      <circle class="progress-bar" cx="80" cy="80" r="70" id="progressBar" />
    </svg>
    <div class="progress-text" id="progressPercent">0%</div>
  </div>
  <div class="processing-text">Creating secure disposable email...</div>
</div>

<div class="container">

<h1>Temp OTP Mail</h1>

<button id="generateBtn">Generate New Email</button>

<div class="current-email" id="currentBox" style="display:none;">

<div id="credentialsBox">

<p>
<span class="label">Email:</span>
<span id="credEmail" class="value"></span>
<button onclick="copyText('credEmail')">Copy Email</button>
</p>

<p>
<span class="label">Password:</span>
<span id="credPass" class="value"></span>
<button onclick="copyText('credPass')">Copy Password</button>
</p>

</div>

<div class="otp-box" id="otpBox">
Waiting for OTP...
</div>

</div>

<div id="status">Ready</div>

<div class="history-title">Generated Email</div>

<div class="history-list" id="historyList"></div>

<div class="note">
• Page auto refreshes every 15 minutes
</div>

</div>

<script src="script.js"></script>

</body>
</html>
