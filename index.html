<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | My Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            text-shadow: 5px 5px 10px rgba(0,0,0,0.5);
        }
        h2 {
            font-size: 2.5rem;
            margin: 10px 0 20px;
        }
        p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
            background: #f0f0f0;
        }
        .sad-face {
            font-size: 6rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sad-face">😕</div>
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>Jo page dhoondh rahe ho, woh yahan nahi hai... Shayad galat rasta le liya! 😅</p>
        <p>Chinta mat karo, ghar wapas ja sakte ho:</p>
        <a href="/" class="btn">Home Page Pe Jao</a>
    </div>
</body>
</html>
